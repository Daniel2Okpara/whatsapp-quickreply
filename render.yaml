services:
  - type: web
    name: wa-quickreply-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false # Set this in the Render Dashboard manually
      - key: NODE_ENV
        value: production
