services:
  - type: web
    name: wa-quickreply-server
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "10000"
      - key: OPENAI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: REFRESH_TOKEN_SECRET
        sync: false
      - key: PADDLE_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: NODE_ENV
        value: "production"
