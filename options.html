<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WA QuickReply — Connect</title>
  <style>
    body{font-family:Arial;padding:20px}
    input{padding:8px;width:100%;margin-bottom:8px}
    button{padding:8px 12px}
  </style>
</head>
<body>
  <div style="display:flex; align-items:center; gap:12px;">
    <div style="display:flex; align-items:center; gap:12px; background: #fff; padding:10px 12px; border-radius:12px; box-shadow: 0 8px 24px rgba(10, 40, 20, 0.06);">
      <img src="icons/icon128.png" alt="WA QuickReply" style="width:56px;height:56px;border-radius:12px;object-fit:cover;" />
      <div>
        <h2 style="margin:0; font-size:18px;">WA QuickReply</h2>
        <div style="color:#666; font-size:13px;">Activate to get started</div>
      </div>
    </div>
  </div>
  <p style="margin-top:12px;">Enter your email to unlock templates, AI replies.</p>
  <label>Email</label>
  <input id="email" placeholder="you@example.com" type="email" />
  <button id="save-email">Save Email</button>
  <hr />
  <label>Or paste connect code (optional)</label>
  <input id="token" placeholder="Enter connect code" />
  <button id="connect">Connect</button>
  <hr />
  <button id="delete-account" style="background:#dc2626;color:white;border:none;padding:8px 12px;border-radius:4px;cursor:pointer;">Delete Account</button>
  <div id="status" style="margin-top:12px"></div>
  <script src="options.js"></script>
</body>
</html>
