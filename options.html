<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>WA QuickReply — Connect</title>
  <style>
    body{font-family:Arial;padding:20px}
    input{padding:8px;width:100%;margin-bottom:8px}
    button{padding:8px 12px}
  </style>
</head>
<body>
  <h2>Connect Extension</h2>
  <p>Enter your email to activate the extension or paste a connect code.</p>
  <label>Email</label>
  <input id="email" placeholder="you@example.com" type="email" />
  <button id="save-email">Save Email</button>
  <hr />
  <label>Or paste connect code (optional)</label>
  <input id="token" placeholder="Enter connect code" />
  <button id="connect">Connect</button>
  <div id="status" style="margin-top:12px"></div>
  <script src="options.js"></script>
</body>
</html>
